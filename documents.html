<!DOCTYPE html>
<html>
<head>
    <title>Dokumenty - Team Project IoT</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .documents-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 24px;
        }
        .document-item {
            background: #23272f;
            border-radius: 12px;
            padding: 24px;
            color: #e3e7ed;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 16px;
            text-decoration: none;
            border: 2px solid #374151;
        }
        .document-item:hover {
            background: #1e293b;
            transform: translateY(-2px);
            border-color: #4b5563;
        }
        .document-icon {
            font-size: 2.5rem;
            color: #4b5563;
            text-align: center;
            margin-bottom: 8px;
        }
        .document-name {
            font-size: 1.1rem;
            font-weight: 500;
            text-align: center;
            color: #e3e7ed;
            word-break: break-word;
        }
        .document-date {
            font-size: 0.9rem;
            color: #9ca3af;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>
    <div class="container">
        <h1>Dokumenty</h1>
        <div class="documents-list" id="documentsList">
            <!-- Documents will be loaded here dynamically -->
        </div>
    </div>

    <script>
        // Load navbar
        fetch('navbar.html').then(r => r.text()).then(html => {
            document.getElementById('navbar-container').innerHTML = html;
        });

        // Hardcoded document references - update this list when adding new documents
        const documents = [
            { name: 'zapisnica_1.pdf', title: 'Zápisnica 1', date: '2.10.2025' },
            { name: 'zapisnica_2.pdf', title: 'Zápisnica 2', date: '9.10.2025' },
            { name: 'zapisnica_3.pdf', title: 'Zápisnica 3', date: '16.10.2025' },
            { name: 'zapisnica_4.pdf', title: 'Zapisnica 4', date: '30.10.2025' },
            { name: 'zapisnica_5.pdf', title: 'Zapisnica 5', date: '10.11.2025' },
            { name: 'zapisnica_6.pdf', title: 'Zapisnica 6', date: '24.11.2025' },
            { name: 'zapisnica_7.pdf', title: 'Zapisnica 7', date: '1.12.2025' },
            { name: 'zapisnica_8.pdf', title: 'Zapisnica 8', date: '9.12.2025' },
            { name: 'zapisnica_9.pdf', title: 'Zapisnica 9', date: '19.12.2025' },
            { name: 'zapisnica_10.pdf', title: 'Zapisnica 10', date: '27.12.2025' },
            { name: 'zapisnica_11.pdf', title: 'Zapisnica 11', date: '5.1.2026' },
            { name: 'zapisnica_12.pdf', title: 'Zapisnica 12', date: '12.1.2026' },
            { name: 'zapisnica_13.pdf', title: 'Zapisnica 13', date: '19.2.2026' },
            { name: 'zapisnica_14.pdf', title: 'Zapisnica 14', date: '25.2.2026' },
            { name: 'zapisnica_15.pdf', title: 'Zapisnica 15', date: '3.3.2026' },
            { name: 'zapisnica_16.pdf', title: 'Zapisnica 16', date: '20.3.2026' },
            { name: 'zapisnica_17.pdf', title: 'Zapisnica 17', date: '27.3.2026' },
            { name: 'zapisnica_18.pdf', title: 'Zapisnica 18', date: '6.4.2026' },
            { name: 'zapisnica_19.pdf', title: 'Zapisnica 19', date: '14.4.2026' },
            { name: 'zapisnica_20.pdf', title: 'Zapisnica 20', date: '22.4.2026' },

            { name: 'zapisnica_23.pdf', title: 'Zapisnica 23', date: '13.5.2026' }


            // Add new documents here in the same format
            // Example:
            // { name: 'zapisnica2.pdf', title: 'Zápisnica 2', date: '23.10.2025' }
        ];

        function displayDocuments() {
            const documentsList = document.getElementById('documentsList');
            documentsList.innerHTML = '';

            documents.forEach(doc => {
                const docElement = document.createElement('a');
                docElement.href = `documents/${doc.name}`;
                docElement.className = 'document-item';
                
                docElement.innerHTML = `
                    <div class="document-icon">📄</div>
                    <div class="document-name">${doc.title}</div>
                    <div class="document-date">${doc.date}</div>
                `;
                
                documentsList.appendChild(docElement);
            });
        }

        // Display documents when page loads
        displayDocuments();
    </script>
</body>
</html>
